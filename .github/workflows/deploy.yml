name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
permissions:
  contents: write # Required for pushing code or tags

  
env:
  VITE_FIREBASE_CONFIG: ${{ secrets.VITE_FIREBASE_CONFIG }}
  VITE_API_KEY: ${{ secrets.VITE_API_KEY }}
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.14.1'
        cache: 'npm'
    - name: Set Remote URL
      run: git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run deploy

