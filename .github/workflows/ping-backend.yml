name: Scheduled Ping

on:
  schedule:
    # Runs every 12 minutes (UTC)
    - cron: '*/12 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send GET Request
        run: curl -X GET "https://payment-tracker-node-backend.onrender.com/"
